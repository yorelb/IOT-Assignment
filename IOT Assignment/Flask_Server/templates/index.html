<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Light Dashboard</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 40px 20px; 
            text-align: center; 
            background-color: rgb(27, 27, 27); 
            color: white;
        }
        
        h1 { margin-bottom: 10px; }
        h2 { margin-bottom: 10px; font-weight: 300; }
        h3 { margin-bottom: 30px; font-weight: 400; color: #aaaaaa; }
        
        .status-val { font-weight: bold; color: #ffca28; } 
        .pattern-val { font-weight: bold; color: #ab0000; text-transform: capitalize; }

        #controls { margin-bottom: 40px; }
        
        button { 
            padding: 12px 24px; 
            margin: 8px; 
            cursor: pointer; 
            border-radius: 6px; 
            border: 2px solid #ab0000; 
            background-color: transparent; 
            color: white; 
            font-weight: bold; 
            transition: all 0.3s ease; 
        }
        
        button:hover { 
            background-color: #ab0000; 
        }

        .card { 
            border: 1px solid #444; 
            padding: 20px; 
            border-radius: 12px; 
            max-width: 800px; 
            margin: auto; 
            background: rgba(255, 255, 255, 0.05); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        canvas { width: 100% !important; height: auto !important; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <h1>[I Lwk forgot our group name] System Dashboard</h1>
    <h2>Ambient Light: <span id="lightDisplay" class="status-val">--</span>%</h2>
    <h3>Active Pattern: <span id="patternDisplay" class="pattern-val">--</span></h3>
    
    <div id="controls">
        <button onclick="setPattern('blink')">Blink</button>
        <button onclick="setPattern('chase')">Chase</button>
        <button onclick="setPattern('fire')">Fire</button>
        <button onclick="setPattern('rainbow')">Rainbow</button>
    </div>

    <div class="card">
        <canvas id="lightChart"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('lightChart').getContext('2d');
        const lightChart = new Chart(ctx, {
            type: 'line',
            data: { 
                labels: Array(20).fill(''), 
                datasets: [{ 
                    label: 'Light Level (%)', 
                    data: [], 
                    borderColor: '#ffffff',
                    backgroundColor: '#ffca28',
                    fill: true,
                    tension: 0.4
                }] 
            },
            options: {
                responsive: true,
                scales: {
                    y: { 
                        beginAtZero: true, 
                        max: 100,
                        grid: { color: 'rgba(255, 255, 255, 0.1)' },
                        ticks: { color: 'white' }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { display: false }
                    }
                },
                plugins: {
                    legend: { labels: { color: 'white' } }
                }
            }
        });

        // AJAX Polling updates every 3 seconds 
        setInterval(() => {
            fetch('/api/data')
                .then(res => res.json())
                .then(data => {
                    // Update the display text, pattern, and the graph data 
                    document.getElementById('lightDisplay').innerText = data.light;
                    document.getElementById('patternDisplay').innerText = data.pattern;
                    lightChart.data.datasets[0].data = data.history;
                    lightChart.update();
                })
                .catch(err => console.error("Error fetching data:", err));
        }, 3000);

        // Send user commands to change patterns via POST 
        function setPattern(pattern) {
            fetch('/api/pattern', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({pattern: pattern})
            })
            .then(res => res.json())
            .then(data => console.log("Pattern set to:", pattern))
            .catch(err => console.error("Error setting pattern:", err));
        }
    </script>
</body>
</html>
